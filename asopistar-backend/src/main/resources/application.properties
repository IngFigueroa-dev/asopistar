# ── Base de datos PostgreSQL ─────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/asopistar
spring.datasource.driver-class-name=org.postgresql.Driver
 
# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=negocio
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
# ── JWT ──────────────────────────────────────────────────────────

jwt.expiration=86400000
 
# ── Servidor ─────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api
 
# ── Logs ─────────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.config.spring.asopistar=DEBUG

# ── Perfil activo ────────────────────────────────────────────────
spring.profiles.active=dev

# ── Jackson: serialización de fechas Java 8+ ─────────────────────────────────
# Evita que LocalDateTime se serialice como array [2026,5,27,10,0,0]
spring.jackson.serialization.write-dates-as-timestamps=false
# Registra el módulo JavaTimeModule automáticamente
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false


# ── Correo (SMTP Gmail) ──────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── URL del frontend (para los enlaces en los correos) ───────────
# En desarrollo apunta a localhost; en producción cambia esta URL
app.url.frontend=http://localhost:5173

# ── Async (para que los correos no bloqueen el hilo HTTP) ────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100

